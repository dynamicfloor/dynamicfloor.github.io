<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const routes = {
        "singular-reg": "/experiences/singular/register/",
      };

      const params = new URLSearchParams(window.location.search);
      const key = params.get("to");

      if (routes[key]) {
        window.location.replace(routes[key]);
      } else {
        document.body.innerHTML = "Not found";
      }
    </script>
  </head>
</html>
